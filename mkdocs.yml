site_name: Ancestree Documentation
site_url: https://js195.github.io/ancestree/
site_description: Lightweight, zero-dependency data lineage for Python.
site_author: Joshua Smith
repo_url: https://github.com/JS195/ancestree
repo_name: JS195/ancestree

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.expand
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share

plugins:
  - search
  - social
  - git-revision-date-localized:
      type: date
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_symbol_type_heading: true
            show_root_full_path: true
            show_source: true
            group_by_category: true
  - mkdocs-jupyter:
      show_input: true
      execute: false
      kernel_name: python3
      no_input: false

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JS195/ancestree
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ancestree/

nav:
  - Home: index.md
  - Examples:
      - Overview: examples.md
      - Basic Usage: examples/basic_usage.ipynb
      - Machine Learning Pipeline: examples/ML_pipeline.ipynb
      - Timing Benchmark: examples/timing_benchmark.ipynb
  - Live Demo: demo.md
  - API Reference: reference.md

extra_css:
  - stylesheets/extra.css