name: Publish to PyPI

# Publishes when you create (and publish) a GitHub Release. Tag it to match the
# version in pyproject.toml, e.g. v0.1.0. Also runnable manually from the
# Actions tab via workflow_dispatch.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check the built distributions
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
